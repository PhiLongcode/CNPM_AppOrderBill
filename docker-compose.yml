services:
  mysql:
    image: mysql:8.4
    container_name: apporder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ycpm_apporderbill
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapporder", "-papporder123"]
      interval: 10s
      timeout: 5s
      retries: 20

  apporder-api:
    build: .
    container_name: apporder-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/ycpm_apporderbill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      SPRING_PROFILES_ACTIVE: api-mysql
    ports:
      - "8080:8080"

volumes:
  mysql-data:
